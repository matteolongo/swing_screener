ui:
  intelligence_providers:
    openai:
      default_model: gpt-4.1-mini
      default_base_url: https://api.openai.com/v1
      suggested_models:
        - gpt-4.1-mini
        - gpt-4o-mini
        - gpt-4.1
        - o4-mini
    mock:
      default_model: mock-classifier
      default_base_url: ""
      suggested_models:
        - mock-classifier

low_level:
  file_lock_timeout_seconds: 5.0
  broker:
    provider: yfinance
    alpaca_paper: true
  risk:
    account_size: 500.0
    risk_pct: 0.01
    k_atr: 2.0
    max_position_pct: 0.6
    min_shares: 1
    min_rr: 2.0
    rr_target: 2.0
    commission_pct: 0.0
    max_fee_risk_pct: 0.2
    regime_enabled: false
    regime_trend_sma: 200
    regime_trend_multiplier: 0.5
    regime_vol_atr_window: 14
    regime_vol_atr_pct_threshold: 6.0
    regime_vol_multiplier: 0.5
  selection:
    universe:
      min_price: 10.0
      max_price: 60.0
      max_atr_pct: 10.0
      require_trend_ok: true
      require_rs_positive: false
      currencies:
        - USD
        - EUR
    ranking:
      w_mom_6m: 0.45
      w_mom_12m: 0.35
      w_rs_6m: 0.2
      top_n: 15
    combined_priority:
      technical_weight: 0.45
      fundamentals_weight: 0.25
      catalyst_weight: 0.20
      valuation_weight: 0.10
      prefilter_multiplier: 3
    signals:
      breakout_lookback: 50
      pullback_ma: 20
      min_history: 260
  execution:
    breakout_stop_buffer_pct: 0.002
    pullback_atr_fraction: 0.25
    pullback_band_atr_low: 0.5
    pullback_band_atr_high: 0.0
    allow_second_chance_breakout: true
  # ---------------------------------------------------------------------------
  # Tier 1 free-first data provider stack
  # ---------------------------------------------------------------------------
  # data_providers below configures the OHLCV / price pipeline (yfinance with
  # Stooq fallback, optional Alpaca validation).  This is separate from
  # `sources.enabled` above, which controls the evidence-adapter chain used by
  # the market-intelligence / catalyst system (yahoo_finance, earnings_calendar,
  # sec_edgar, company_ir_rss, exchange_announcements, financial_news_rss).
  # Fundamentals providers (sec_edgar → yfinance) are configured independently
  # via `FundamentalsConfig` and are NOT listed here.
  # ---------------------------------------------------------------------------
  data_providers:
    yfinance:
      thread_safe_batch_size: 20
      retry_chunk_size: 10
      auto_adjust: true
      progress: false
      stooq_fallback_enabled: true
    stooq:
      timeout_seconds: 10.0
    alpaca:
      rate_limit_requests: 200
      rate_limit_window_seconds: 60
      max_retries: 3
      retry_delay_base_seconds: 1.0
