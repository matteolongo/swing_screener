config:
  enabled: false
  providers:
  - yahoo_finance
  universe_scope: screener_universe
  market_context_symbols:
  - SPY
  - QQQ
  - XLK
  - SMH
  - XBI
  llm:
    enabled: false
    provider: openai
    model: gpt-4.1-mini
    base_url: https://api.openai.com/v1
    enable_cache: true
    enable_audit: true
    cache_path: data/intelligence/llm_cache.json
    audit_path: data/intelligence/llm_audit
    max_concurrency: 4
    education_template_version: v1
    education_style_level: beginner
    education_max_tokens: 450
    education_forbidden_claim_categories:
    - prediction
    - guarantee
    - financial_advice
    education_recommendation_system_prompt: ''
    education_recommendation_user_prompt_template: ''
    education_thesis_system_prompt: ''
    education_thesis_user_prompt_template: ''
    education_learn_system_prompt: ''
    education_learn_user_prompt_template: ''
    web_search_model: gpt-4o
    web_search_max_tokens: 4000  # raised for multi-hop news + catalyst search
  catalyst:
    lookback_hours: 72
    recency_half_life_hours: 36
    false_catalyst_return_z: 1.5
    min_price_reaction_atr: 0.8
    require_price_confirmation: true
  theme:
    enabled: true
    min_cluster_size: 3
    min_peer_confirmation: 2
    curated_peer_map_path: data/intelligence/peer_map.yaml
  opportunity:
    technical_weight: 0.55
    catalyst_weight: 0.45
    max_daily_opportunities: 8
    min_opportunity_score: 0.55
  sources:
    enabled:
    - yahoo_finance
    - earnings_calendar
    - sec_edgar
    - company_ir_rss
    scraping_enabled: false
    allowed_domains: []
    rate_limits:
      requests_per_minute: 90
      max_concurrency: 4
    timeouts:
      connect_seconds: 5.0
      read_seconds: 20.0
    scrape_policy:
      require_robots_allow: true
      deny_if_robots_unreachable: true
      require_tos_allow_flag: true
      user_agent: swing-screener-intelligence-bot/1.0
      max_robots_cache_hours: 24
  evidence:
    # Collectors to fan-out to when building catalyst evidence for the LLM prompt.
    enabled_sources:
    - sec_edgar_catalysts   # SEC EDGAR submissions API: recent 8-K/6-K filings (US)
    - company_ir_rss        # Official IR RSS from the ir_feeds.json seed map
    recency_window_days: 30   # Discard items older than this many days
    max_items_per_symbol: 8   # Max curated items per ticker after dedup + sort
    discovery_enabled: true       # auto-discover IR feeds for tickers not in the seed
    discovery_found_ttl_days: 30  # re-validate a discovered feed after N days
    discovery_negative_ttl_days: 7  # re-attempt discovery after N days of no feed
    discovery_paths:              # bounded path probes when no <link> is advertised
    - /rss
    - /feed
    - /news/rss
    - /newsroom/rss
    - /investors/rss
    - /en/rss
    sec_forms:
    - 8-K
    - 6-K
    - SC 13D
    - SC 13G
    - 424B
    - DEF 14A
    http:
      user_agent: swing-screener-intelligence-bot/1.0
      connect_timeout_seconds: 5.0
      read_timeout_seconds: 20.0
  scoring_v2:
    enabled: true
    weights:
      reaction_z_component: 0.22
      atr_shock_component: 0.12
      recency_component: 0.14
      proximity_component: 0.14
      materiality_component: 0.14
      source_quality_component: 0.1
      confirmation_component: 0.08
      filing_impact_component: 0.06
      uncertainty_penalty_component: 0.1
    low_evidence_confirmation_threshold: 0.25
    low_evidence_source_quality_threshold: 0.45
    stale_event_decay_hours: 120
  analysis_history:
    max_entries: 50   # per-symbol entries kept on disk (data/intelligence/history/{TICKER}.json)
    digest_size: 5    # most-recent runs fed back to the LLM as the thesis-drift digest (<= max_entries)
  pre_open:
    enabled: true
    timezone: America/New_York
    market_open: "09:30"    # ET regular-session open; pre-open window ends here
    window_start: "00:00"   # ET lower bound of the pre-open window (overnight tape)
    session_close: "16:00"  # ET regular-session close; bounds the overnight news window
  calendar:
    binary_event_window_days: 3
    binary_event_min_materiality: 0.75
    binary_event_min_threshold_boost: 0.08
    low_evidence_min_threshold_boost: 0.06
bootstrapped_from_strategy: true
updated_at: '2026-05-14T09:37:59'
