server:
  name: swing-screener-mcp
  version: 0.1.0
  description: Model Context Protocol server for Swing Screener
environment: dev
features:
  portfolio:
    enabled: true
    tools:
    - list_positions
    - get_position
    - update_position_stop
    - list_orders
    - suggest_position_stop
    - close_position
  screener:
    enabled: true
    tools:
    - run_screener
    - list_universes
    - preview_order
  strategy:
    enabled: true
    tools:
    - list_strategies
    - get_strategy
    - get_active_strategy
    - set_active_strategy
  config:
    enabled: true
    tools:
    - get_config
    - update_config
  intelligence:
    enabled: true
    tools:
    - get_workspace_context
    - get_intelligence_opportunities
    - get_intelligence_events
    - chat_answer
  daily_review:
    enabled: true
    tools:
    - get_daily_review
    - get_candidate_recommendations
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
